version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mediflow_postgres
    restart: always
    environment:
      POSTGRES_DB: ${MEDIFLOW_POSTGRES_DB:-mediflow}
      POSTGRES_USER: ${MEDIFLOW_POSTGRES_USER:-mediflow_user}
      POSTGRES_PASSWORD: ${MEDIFLOW_POSTGRES_PASSWORD:-mediflow_password}
    ports:
      - "${MEDIFLOW_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  languagetool:
    image: meyerd/languagetool
    container_name: mediflow_languagetool
    restart: always
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:8010/v2/check || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mediflow_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MEDIFLOW_POSTGRES_HOST=postgres
      - MEDIFLOW_POSTGRES_DB=${MEDIFLOW_POSTGRES_DB:-mediflow}
      - MEDIFLOW_POSTGRES_USER=${MEDIFLOW_POSTGRES_USER:-mediflow_user}
      - MEDIFLOW_POSTGRES_PASSWORD=${MEDIFLOW_POSTGRES_PASSWORD:-mediflow_password}
      - MEDIFLOW_POSTGRES_PORT=5432
      - MEDIFLOW_LANGUAGETOOL_URL=http://languagetool:8010/v2/check
      - MEDIFLOW_LANGUAGETOOL_TIMEOUT_SECONDS=5.0
      - MEDIFLOW_LLM_MODEL=${MEDIFLOW_LLM_MODEL:-llama3.2:1b}
      - MEDIFLOW_EMBEDDING_MODEL=${MEDIFLOW_EMBEDDING_MODEL:-nomic-embed-text}
      - RAG_EMBEDDING_PROVIDER=${RAG_EMBEDDING_PROVIDER:-ollama}
      - MEDIFLOW_API_URL=http://backend:8000
    volumes:
      - chroma_data:/app/db/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      languagetool:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mediflow_frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      - MEDIFLOW_API_URL=http://backend:8000
      - MEDIFLOW_LLM_MODEL=${MEDIFLOW_LLM_MODEL:-llama3.2:1b}
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
